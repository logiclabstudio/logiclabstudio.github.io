<article class="card reveal">
  <p class="kicker mb-4">{{category}}</p>
  <h3>{{title}}</h3>
  <p class="mt-3">{{description}}</p>
  <div class="feature-list mt-6">
    <div class="feature-item">
      <span class="dot" aria-hidden="true"></span>
      <div>
        <strong>Outcome</strong>
        <p>{{outcome}}</p>
      </div>
    </div>
  </div>
</article>
